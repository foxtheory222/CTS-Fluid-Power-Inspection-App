name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Run tests with coverage
        run: flutter test --coverage --no-pub

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android integration matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          disable-animations: true
          emulator-options: >-
            -no-snapshot -no-window -gpu swiftshader_indirect -noaudio
            -no-boot-anim -camera-back none
          script: |
            run_integration() {
              log_file="$(mktemp)"
              if flutter test --no-pub "$1" -d emulator-5554 >"$log_file" 2>&1; then
                cat "$log_file"
                rm -f "$log_file"
                return 0
              fi
              cat "$log_file"
              if ! grep -q "Failed to start Dart Development Service" "$log_file"; then
                rm -f "$log_file"
                return 1
              fi
              rm -f "$log_file"
              echo "DDS failed to start; retrying $1 on the booted emulator."
              adb wait-for-device
              flutter test --no-pub "$1" -d emulator-5554
            }
            run_integration integration_test/production_app_smoke_test.dart
            run_integration integration_test/app_flow_test.dart

      - name: Build debug APK
        run: flutter build apk --debug --no-pub

      - name: Build release APK
        run: flutter build apk --release --no-pub

      - name: Run Android release lint
        run: ./android/gradlew -p android lintRelease --no-daemon

      - name: Upload APKs, coverage, and lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fluid-power-ci-artifacts-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
            coverage/lcov.info
            build/app/reports/lint-results-release.html
            build/app/reports/lint-results-release.txt
            build/app/reports/lint-results-release.xml
